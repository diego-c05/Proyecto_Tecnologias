<div class="materias-lista">

  <div class="header">
    <h2>Lista de Materias</h2>
    <span class="count" *ngIf="!cargando">({{ materias.length || 0 }})</span>
  </div>

  <div class="loading" *ngIf="cargando">
    <span class="spinner"></span>
    Cargando materias...
  </div>


  <ng-container *ngIf="!cargando">
    <div class="table-wrapper" *ngIf="(materias.length || 0) > 0; else sinMaterias">
      <table class="materias-table">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Código</th>
            <th>Sección</th>
            <th class="acciones">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let m of materias">
            <td class="nombre">{{ m.nombre }}</td>
            <td>{{ m.codigo }}</td>
            <td>{{ m.seccion }}</td>

            <td class="acciones">
        
              <button
                class="icon-btn icon-btn--edit"
                type="button"
                (click)="editMateria(m)"
                title="Modificar"
                aria-label="Modificar"
              >
                <span class="material-icons">edit</span>
              </button>

            
              <button
                class="icon-btn icon-btn--delete"
                type="button"
                (click)="eliminarMateria(m.id)"
                title="Eliminar"
                aria-label="Eliminar"
              >
                <span class="material-icons">delete</span>
              </button>
            </td>

          </tr>
        </tbody>
      </table>
    </div>

    <ng-template #sinMaterias>
      <div class="empty-state">
        <div class="empty-icon">📚</div>
        <div>
          <strong>No hay materias registradas.</strong>
          <div class="empty-sub">
            Crea una nueva materia para que aparezca en la tabla.
          </div>
        </div>
      </div>
    </ng-template>
  </ng-container>

</div>
